<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paleta de colores utilizados</title>
    <style>
        body{
            background-color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .background{
            background: rgb(55,27,88);
background: -moz-linear-gradient(29deg, rgba(55,27,88,1) 0%, rgba(76,53,117,1) 100%, rgba(0,212,255,1) 100%);
background: -webkit-linear-gradient(29deg, rgba(55,27,88,1) 0%, rgba(76,53,117,1) 100%, rgba(0,212,255,1) 100%);
background: linear-gradient(29deg, rgba(55,27,88,1) 0%, rgba(76,53,117,1) 100%, rgba(0,212,255,1) 100%);
filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#371b58",endColorstr="#00d4ff",GradientType=1);
height: 400px;
color: white;
        }
        .c4c35{
            background-color: #4C3575;
        }
        .used{
            margin: 15%;
            font-size: 3rem;
        }
        .c371B58{
            background-color: #371B58;
            color: white;
        }    
        </style>
</head>
<body>
    <div class="background">
        <br>
        <h2>Linear Gradient</h2>
    </div>
    <div class="used">
        <h3>Colores usados para el gradient</h3>
        <ul>
            <li class="c371B58">#371B58</li>
            <li class="c4c35">#4C3575</li>
        </ul>
    </div>
</body>
</html>
